name: Deploy Video Recap Agent

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -e

            echo "=== Pulling latest code ==="
            cd ~/videorecap
            git reset --hard HEAD
            git pull origin main

            echo "=== Computing build version ==="
            BUILD_NUM=$(git rev-list --count HEAD)
            APP_VERSION="build-${BUILD_NUM}"
            echo "Version: ${APP_VERSION}"

            echo "=== Building containers ==="
            APP_VERSION=${APP_VERSION} docker compose -f docker-compose.yml -f docker-compose.prod.yml build --build-arg APP_VERSION=${APP_VERSION}

            echo "=== Starting services ==="
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

            echo "=== Waiting for backend to be ready ==="
            sleep 10

            echo "=== Running database migrations ==="
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T -e PYTHONPATH=/app backend alembic upgrade head || echo "Migration skipped (may not have new migrations)"

            echo "=== Cleaning up old images ==="
            docker image prune -f

            echo "=== Deployment complete ==="
            docker compose ps

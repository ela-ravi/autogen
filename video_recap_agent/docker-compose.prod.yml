services:
  backend:
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
          cpus: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 4G
          cpus: "2"

  celery-beat:
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  frontend:
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  postgres:
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    deploy:
      resources:
        limits:
          memory: 512M

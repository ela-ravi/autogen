upstream recap_frontend {
    server 127.0.0.1:3100;
}

upstream recap_backend {
    server 127.0.0.1:8100;
}

upstream recap_minio {
    server 127.0.0.1:9100;
}

server {
    listen 80;
    server_name _;  # Replace with your domain, e.g.: recap.yourdomain.com

    client_max_body_size 2G;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # --- Backend API ---
    location /api/ {
        proxy_pass http://recap_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- WebSocket for live job progress ---
    location /api/v1/ws/ {
        proxy_pass http://recap_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # --- MinIO presigned URL downloads ---
    location /storage/ {
        proxy_pass http://recap_minio/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Frontend (catch-all) ---
    location / {
        proxy_pass http://recap_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
